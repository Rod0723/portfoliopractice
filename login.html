<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/reset.css">
    <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
</head>
<body>
    <div class="glass-card">
        <div class="text-login">
            <h1 style="font-size: 24px;">Sign in with email</h1>
            <h4 style="font-size: 20px;">Let's get to know each other</h4>
        </div>
        <div class="user-input">
            <div class="email"><input type="email" placeholder="Email"></div>
            <div class="password"><input type="password" placeholder="Enter your password"></div>
            <div class="forgot-password"><h4>Forgot password?</h4></div>
        </div>  
        <a href="index.html" class="login-button">Log In</a>
    </div>  
</body>
</html>
